name: Release

# Triggered when a `v*` tag is pushed. Builds wheel + sdist and
# publishes to PyPI via Trusted Publishers (OIDC). No tokens or
# secrets needed; the trust is registered on PyPI's side.
#
# Tag push is the source of truth here — release-cuts go `git tag vX.Y.Z
# && git push --tags`, no GitHub Release UI step required.
# `workflow_dispatch` is left enabled for manual recovery (re-run a
# failed publish without retagging).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for PyPI Trusted Publishers (OIDC)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify dist with twine
        run: |
          python -m pip install twine
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
